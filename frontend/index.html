<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediNexus - Your Medical Records Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      // Initialize theme before render to prevent flash
      (() => {
        try {
          const stored = localStorage.getItem('theme');
          const mode = (stored === 'light' || stored === 'dark' || stored === 'auto') ? stored : 'auto';
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const resolved = mode === 'auto' ? (prefersDark ? 'dark' : 'light') : mode;
          const root = document.documentElement;
          
          root.classList.remove('light', 'dark');
          root.classList.add(resolved);
          
          if (mode === 'auto') {
            root.removeAttribute('data-theme');
          } else {
            root.setAttribute('data-theme', mode);
          }
          
          root.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="antialiased wrap-anywhere selection:bg-[rgba(79,184,178,0.24)]">
    <!-- Preloader -->
    <div id="preloader" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
            <div style="width:48px;height:48px;border:4px solid #e5e7eb;border-top-color:#4fb8b2;border-radius:50%;animation:spin 1s linear infinite;"></div>
            <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:600;color:#374151;">MediNexus</span>
        </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', function() {
        document.getElementById('preloader').style.display = 'none';
      });
    </script>
  </body>
</html>
